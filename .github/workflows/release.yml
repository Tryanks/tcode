name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_TAG: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_TAG}"
          case "$tag" in v*) ;; *) echo "Tag must start with v: $tag" >&2; exit 1;; esac
          version="${tag#v}"
          prerelease=false
          case "$version" in *-*) prerelease=true;; esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  package:
    name: ${{ matrix.label }}
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            os: macos-26
            target: aarch64-apple-darwin
            platform: macos
            arch: arm64
          - label: macOS x64
            os: macos-26
            target: x86_64-apple-darwin
            platform: macos
            arch: x64
          - label: Windows x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x64
          - label: Windows arm64
            os: windows-2022
            target: aarch64-pc-windows-msvc
            platform: windows
            arch: arm64
          - label: Linux x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
          - label: Linux arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_PROFILE_RELEASE_LTO: thin
      CARGO_PROFILE_RELEASE_STRIP: symbols
      VERSION: ${{ needs.setup.outputs.version }}
      RELEASE_TAG: ${{ needs.setup.outputs.tag }}
      PRERELEASE: ${{ needs.setup.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.setup.outputs.tag }}

      - name: Install stable Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          apt_get=(sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=3)
          "${apt_get[@]}" update
          "${apt_get[@]}" install -y --no-install-recommends \
            build-essential clang cmake pkg-config libssl-dev libzstd-dev mold \
            libasound2-dev libfontconfig-dev libwayland-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libx11-xcb-dev libxcb1-dev libgbm-dev libvulkan-dev
          if cargo tree -e normal -i glib-sys >/dev/null 2>&1; then
            "${apt_get[@]}" install -y --no-install-recommends \
              libgtk-3-dev libwebkit2gtk-4.1-dev
          fi

      - name: Build release binary
        shell: bash
        run: |
          start=$SECONDS
          cargo build --release --locked --target "${{ matrix.target }}"
          elapsed=$((SECONDS - start))
          echo "### ${{ matrix.label }} build: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"

      - name: Package macOS app, zip, and DMG
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          app="dist/Tcode.app"
          mkdir -p \
            "$app/Contents/MacOS" \
            "$app/Contents/Resources" \
            dmg-root
          cp "target/${{ matrix.target }}/release/tcode" "$app/Contents/MacOS/tcode"
          cp assets/icons/app/tcode.icns "$app/Contents/Resources/tcode.icns"
          chmod +x "$app/Contents/MacOS/tcode"
          cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>tcode</string>
            <key>CFBundleIconFile</key><string>tcode.icns</string>
            <key>CFBundleIdentifier</key><string>com.tryanks.tcode</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleName</key><string>Tcode</string>
            <key>CFBundleDisplayName</key><string>Tcode</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>LSApplicationCategoryType</key><string>public.app-category.developer-tools</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
          plutil -lint "$app/Contents/Info.plist"
          ditto -c -k --sequesterRsrc --keepParent "$app" \
            "dist/tcode-${VERSION}-macos-${{ matrix.arch }}.zip"
          cp -R "$app" dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname Tcode -srcfolder "$PWD/dmg-root" -ov \
            -fs HFS+ -format UDZO \
            "$PWD/dist/tcode-${VERSION}-macos-${{ matrix.arch }}.dmg"
          rm -rf "dist/Tcode.app" dmg-root

      - name: Package Windows zip
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $stage = "dist\tcode-$env:VERSION-windows-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\tcode.exe" "$stage\tcode.exe"
          @"
          Tcode $env:VERSION

          Microsoft Edge WebView2 Runtime is required (included with Windows 11).
          "@ | Set-Content "$stage\README.txt"
          Compress-Archive -Path "$stage\*" -DestinationPath "dist\tcode-$env:VERSION-windows-${{ matrix.arch }}.zip"
          Remove-Item -Recurse -Force $stage

      - name: Package Linux tarball
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          stage="dist/tcode-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p \
            "$stage/bin" \
            "$stage/share/applications" \
            "$stage/share/icons/hicolor/1024x1024/apps"
          cp "target/${{ matrix.target }}/release/tcode" "$stage/bin/tcode"
          cp assets/icons/app/tcode.png \
            "$stage/share/icons/hicolor/1024x1024/apps/com.tryanks.tcode.png"
          chmod +x "$stage/bin/tcode"
          cat > "$stage/share/applications/com.tryanks.tcode.desktop" <<DESKTOP
          [Desktop Entry]
          Type=Application
          Name=Tcode
          Comment=Desktop coding agent client
          Exec=tcode
          Icon=com.tryanks.tcode
          Terminal=false
          Categories=Development;
          StartupWMClass=tcode
          DESKTOP
          cat > "$stage/README.txt" <<README
          Tcode ${VERSION}

          Install for all users with:
            sudo cp -R bin share /usr/local/

          Runtime requirements include ALSA, Fontconfig, Wayland/X11 libraries,
          libgbm, and a Vulkan loader plus a working Vulkan ICD/graphics driver.
          README
          tar -C dist -czf "dist/tcode-${VERSION}-linux-${{ matrix.arch }}.tar.gz" \
            "tcode-${VERSION}-linux-${{ matrix.arch }}"
          rm -rf "$stage"

      - name: List packaged files
        shell: bash
        run: ls -lh dist

      - name: Create release if needed and publish package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          cat > "$notes_file" <<'NOTES'
          ## Platform notes

          - **macOS 12+**: these test builds are not signed or notarized. After moving the app to Applications, clear Gatekeeper quarantine with:

            `xattr -dr com.apple.quarantine /Applications/Tcode.app`

          - **Windows**: Microsoft Edge WebView2 Runtime is required. It is included with Windows 11.
          - **Linux**: requires ALSA, Fontconfig, Wayland/X11 client libraries, libgbm, the Vulkan loader, and a working Vulkan ICD/graphics driver.

          Packages are uploaded as soon as each platform build completes. macOS artifacts are
          architecture-specific. Windows MSI/NSIS and Linux AppImage packages are not currently
          produced. `SHA256SUMS.txt` is added after every platform package has finished.
          NOTES

          release_args=(
            "$RELEASE_TAG"
            --repo "$REPOSITORY"
            --verify-tag
            --title "$RELEASE_TAG"
            --generate-notes
            --notes-file "$notes_file"
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          if ! gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            if ! gh release create "${release_args[@]}"; then
              # Another matrix job may have won the create race. Give the API a
              # moment to expose that release, but fail if it never appears.
              for _ in {1..6}; do
                gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1 && break
                sleep 2
              done
              gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null
            fi
          fi

          gh release upload "$RELEASE_TAG" dist/* \
            --repo "$REPOSITORY" \
            --clobber

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  finalize:
    name: Publish release checksums
    needs: [setup, package]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v8
        with:
          pattern: package-*
          path: dist
          merge-multiple: true

      - name: Show release files
        run: ls -lh dist

      - name: Generate SHA-256 checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Upload aggregate checksums
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.setup.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release upload "$RELEASE_TAG" dist/SHA256SUMS.txt \
            --repo "$REPOSITORY" \
            --clobber

      - name: Show published release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.setup.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: gh release view "$RELEASE_TAG" --repo "$REPOSITORY" --json assets --jq '.assets[].name'

  publish-aur:
    name: Publish to AUR
    needs: [setup, finalize]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.setup.outputs.prerelease == 'false'
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    env:
      GIT_SSH_COMMAND: ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new
    steps:
      - name: Initialize pacman and install dependencies
        run: |
          pacman-key --init && pacman-key --populate
          pacman -Syu --noconfirm --needed git openssh

      - name: Download Linux packages
        uses: actions/download-artifact@v8
        with:
          pattern: package-linux-*
          path: dist
          merge-multiple: true

      - name: Calculate SHA256 checksums
        id: checksums
        working-directory: dist
        run: |
          sha256_x64=$(sha256sum "tcode-${{ needs.setup.outputs.version }}-linux-x64.tar.gz" | cut -d' ' -f1)
          sha256_arm64=$(sha256sum "tcode-${{ needs.setup.outputs.version }}-linux-arm64.tar.gz" | cut -d' ' -f1)
          echo "x64=$sha256_x64" >> "$GITHUB_OUTPUT"
          echo "arm64=$sha256_arm64" >> "$GITHUB_OUTPUT"

      - name: Install SSH key for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

      - name: Clone AUR repository
        run: git clone aur@aur.archlinux.org:tcode-bin.git aur-repo

      - name: Update pkgver and checksums
        working-directory: aur-repo
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ needs.setup.outputs.version }}/" PKGBUILD
          sed -i "s/^sha256sums_x86_64=('.*')/sha256sums_x86_64=('${{ steps.checksums.outputs.x64 }}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=('.*')/sha256sums_aarch64=('${{ steps.checksums.outputs.arm64 }}')/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Generate .SRCINFO
        working-directory: aur-repo
        run: |
          useradd -m builder
          chown -R builder:builder .
          runuser -u builder -- makepkg --printsrcinfo > .SRCINFO

      - name: Commit and push to AUR
        working-directory: aur-repo
        run: |
          git config --global --add safe.directory "$PWD"
          if git diff --quiet; then
            echo "No changes. AUR package is already up to date."
            exit 0
          fi
          git add PKGBUILD .SRCINFO
          git commit -m "upstream v${{ needs.setup.outputs.version }}"
          git push origin master
          echo "::notice::Published tcode-bin v${{ needs.setup.outputs.version }} to AUR"
